# Box Office Jedi — Automated Data Pipeline
# ============================================
# Two separate schedules:
#
#   DAILY CHART  — every day at 2:00 PM ET (19:00 UTC)
#     Scrapes yesterday's daily box office numbers.
#     The Numbers typically posts daily data around midday.
#
#   WEEKEND CHART — Sundays and Mondays at 5:00 PM ET (22:00 UTC)
#     Sunday  → Estimates are posted mid-afternoon. Saved as is_estimates: true.
#     Monday  → Actuals are confirmed mid-afternoon. Saved as is_estimates: false.
#     NEVER overwrites a file that already has confirmed actuals (is_estimates: false).
#     NEVER overwrites weekend.json with data older than what's already there.
#
# Manual trigger:
#   GitHub → Actions → "Update Box Office Data" → Run workflow
#   Inputs:
#     mode       : daily / weekend / all (default: all)
#     start_date : optional YYYY-MM-DD — scrape that specific day
#                  (in weekend mode, the Friday of the target weekend)
#     end_date   : optional YYYY-MM-DD — inclusive end of a daily range.
#                  Example: start_date=2026-04-17, end_date=2026-04-21
#                  scrapes all five days in one run.

name: Update Box Office Data

on:
  schedule:
    # 2:00 PM ET (19:00 UTC) every day — daily chart only
    - cron: "0 19 * * *"
    # 5:00 PM ET (22:00 UTC) Sunday + Monday — weekend chart (estimates then actuals)
    - cron: "0 22 * * 0,1"
  workflow_dispatch:
    inputs:
      mode:
        description: "What to update: daily, weekend, or all"
        required: false
        default: "all"
      start_date:
        description: "Backfill start date (YYYY-MM-DD). Leave blank for default (yesterday)."
        required: false
        default: ""
      end_date:
        description: "Backfill end date (YYYY-MM-DD). Leave blank to scrape just start_date."
        required: false
        default: ""

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Determine scraper mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode || 'all' }}" >> $GITHUB_OUTPUT
          elif echo "${{ github.event.schedule }}" | grep -q "0 22"; then
            # 5 PM ET schedule (Sun/Mon) → weekend chart
            echo "mode=weekend" >> $GITHUB_OUTPUT
          else
            # 2 PM ET schedule → daily chart
            echo "mode=daily" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper (${{ steps.mode.outputs.mode }} mode)
        run: |
          ARGS="--mode ${{ steps.mode.outputs.mode }}"
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.start_date }}"
          fi
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            ARGS="$ARGS --end-date ${{ github.event.inputs.end_date }}"
          fi
          echo "Running: python3 scripts/scrape_the_numbers.py $ARGS"
          python3 scripts/scrape_the_numbers.py $ARGS
        continue-on-error: true

      - name: Run TMDB sync (Mondays only)
        if: |
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'schedule' && github.event.schedule == '0 22 * * 0,1')
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python3 scripts/tmdb_api.py
        continue-on-error: true

      - name: Refresh per-movie weekend history
        # Rebuilds data/movie_weekends/*.json so showdown pages stay current.
        run: python3 scripts/aggregate_movie_weekends.py
        continue-on-error: true

      - name: Rebuild distributor index
        # Aggregates Studio info from every daily/weekend/yearly file into
        # data/distributors.json. The daily page falls back to this when an
        # individual scraped row is missing the Distributor column.
        run: python3 scripts/build_distributor_index.py
        continue-on-error: true

      - name: Rebuild movie totals index
        # Walks every yearly archive and builds data/movie_totals.json so the
        # movie profile page can show the real cumulative domestic gross
        # (including weekday revenue and post-drop-off run) instead of an
        # underestimate from summing weekend grosses.
        run: python3 scripts/build_movie_totals_index.py
        continue-on-error: true

      - name: Commit and push updated data files
        run: |
          git config user.name "Box Office Jedi Bot"
          git config user.email "bot@boxofficejedi.com"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "📊 Auto-update box office data $(date +'%Y-%m-%d') [${{ steps.mode.outputs.mode }}]"
            git pull --rebase origin main
            git push
          else
            echo "No data changes — skipping commit."
          fi
